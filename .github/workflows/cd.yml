name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Build
        run: |
          npm ci
          npm run build
      
      - name: Deploy
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$KEY" > deploy_key
          chmod 600 deploy_key
          
          ssh -o StrictHostKeyChecking=no -i deploy_key $USER@$HOST "mkdir -p ~/frontend-build"
          scp -o StrictHostKeyChecking=no -i deploy_key -r ./dist/* $USER@$HOST:~/frontend-build/
          
          ssh -o StrictHostKeyChecking=no -i deploy_key $USER@$HOST << 'EOF'
            sudo rm -rf /usr/share/nginx/html/*
            sudo cp -r ~/frontend-build/* /usr/share/nginx/html/
            sudo chown -R nginx:nginx /usr/share/nginx/html/
            sudo chmod -R 755 /usr/share/nginx/html/
            sudo systemctl restart nginx
            rm -rf ~/frontend-build
          EOF
          
          rm -f deploy_key